<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MSSquare Technologies</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="new-login-body">
    <!-- SIMPLE DIAGNOSTIC -->
    <div style="color: black; background: white; font-size: 20px; border: 5px solid red;">SERVER IS OK - IF YOU SEE THIS, TEMPLATE LOADED</div>

    <div class="new-login-container">
        <div class="login-logo-circle">
            <img src="{{ url_for('static', filename='css/images/logo.png') }}" alt="MSSQUARE Logo">
        </div>

        <div class="new-login-card">
            <h1>Welcome to MSSQUARE</h1>
            <p class="sub-heading">Employee Attendance Management System</p>

            <form method="POST" action="/login" class="new-signin-form">
                <select name="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Admin Login</option>
                    <option value="employee">Employee Login</option>
                </select>

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button type="submit" class="new-login-btn">Sign In</button>
            </form>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
